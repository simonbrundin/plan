apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hasura
  namespace: hasura
spec:
  interval: 5m
  chart:
    spec:
      chart: hasura
      version: 3.0.0
      sourceRef:
        kind: HelmRepository
        name: hasura-extra
        namespace: flux-system
  install:
    createNamespace: true
  upgrade:
    remediation:
      retries: 3
  values:
    secret:
      jwtSecret:
        type: "RS256"
        jwk_url: "https://auth.simonbrundin.com/application/o/plan/.well-known/jwks.json"
        claims_map:
          x-hasura-default-role: "user"
          x-hasura-allowed-roles:
            - "user"
            - "admin"
          x-hasura-user-sub: "sub"
    config:
      enableConsole: true
      corsDomains: "*"
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - db/postgres.yaml
  - hasura.yaml
configMapGenerator:
  - name: postgres-init-scripts
    files:
      - db/schema.sql
      - db/seed-data.sql
  - name: postgres-config
    literals:
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE_URL=postgres://plan:plan@postgres:5432/plan
    options:
      disableNameSuffixHash: true
  - name: hasura-config
    literals:
      - HASURA_PORT=8080
    options:
      disableNameSuffixHash: true

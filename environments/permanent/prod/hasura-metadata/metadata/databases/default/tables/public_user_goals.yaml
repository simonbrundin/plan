table:
  name: user_goals
  schema: public
object_relationships:
  - name: goal
    using:
      foreign_key_constraint_on: goal_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - goal_id
select_permissions:
  - role: user
    permission:
      columns:
        - user_id
        - goal_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id

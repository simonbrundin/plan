table:
  name: users
  schema: public
array_relationships:
  - name: user_goals
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_goals
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - sub
        - email
        - first_name
        - last_name
        - created
      filter:
        id:
          _eq: X-Hasura-User-Id

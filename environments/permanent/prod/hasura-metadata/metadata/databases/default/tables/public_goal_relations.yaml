table:
  name: goal_relations
  schema: public
object_relationships:
  - name: goal
    using:
      foreign_key_constraint_on: child_id
  - name: goalByParentId
    using:
      foreign_key_constraint_on: parent_id
insert_permissions:
  - role: user
    permission:
      check:
        _and:
          - goalByParentId:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
          - goal:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
      columns:
        - parent_id
        - child_id
        - order
        - weight
select_permissions:
  - role: user
    permission:
      columns:
        - parent_id
        - child_id
        - order
        - weight
      filter:
        _and:
          - goalByParentId:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
          - goal:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
update_permissions:
  - role: user
    permission:
      columns:
        - order
        - weight
      filter:
        _and:
          - goalByParentId:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
          - goal:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        _and:
          - goalByParentId:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id
          - goal:
              user_goals:
                user_id:
                  _eq: X-Hasura-User-Id

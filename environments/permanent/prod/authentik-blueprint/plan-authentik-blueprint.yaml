apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-plan-blueprint
  namespace: authentik
  labels:
    app.kubernetes.io/created-by: plan
    app.kubernetes.io/part-of: plan
data:
  blueprint.yaml: |
    # yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
    # Authentik Blueprint för Plan Applikationen
    # Används av nuxt-auth-utils på plan.simonbrundin.com

    version: 1
    metadata:
      name: plan-oidc-provider
      labels:
        component: plan

    entries:
      # 1. Skapa OAuth2/OIDC Provider för Plan
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          slug: plan
        attrs:
          name: Plan App Provider
          slug: plan
          client_type: public
          redirect_uris:
            - "https://plan.simonbrundin.com/api/auth/authentik"
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris_with_allowed_domains: true
          include_claims_in_id_token: true
          issuer_mode: per_app
          sub_mode: hash_email
          access_code_validity: "minutes=5"
          access_token_validity: "hours=1"
          refresh_token_validity: "days=7"
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

      # 2. Skapa Application för Plan
      - model: authentik_core.application
        state: present
        identifiers:
          slug: plan
        attrs:
          name: Plan
          slug: plan
          provider: !Find [authentik_providers_oauth2.oauth2provider, [slug, plan]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
          meta_launch_url: "https://plan.simonbrundin.com"

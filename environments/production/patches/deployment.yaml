apiVersion: apps/v1
kind: Deployment
metadata:
  name: plan-app
spec:
  template:
    spec:
      containers:
        - name: plan-app
          image: ghcr.io/simonbrundin/plan@sha256:907a4e048be67dd86367eca2f821911f0368a62d0da088b7562a61c6f84042b5
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: plan-db-user
                  key: uri
            - name: NUXT_SESSION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: NUXT_SESSION_PASSWORD
            - name: NUXT_OAUTH_ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: NUXT_OAUTH_ZITADEL_CLIENT_ID
            - name: NUXT_OAUTH_ZITADEL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: NUXT_OAUTH_ZITADEL_CLIENT_SECRET
            - name: NUXT_OAUTH_ZITADEL_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: NUXT_OAUTH_ZITADEL_DOMAIN
            - name: NUXT_OAUTH_ZITADEL_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: auth
                  key: NUXT_OAUTH_ZITADEL_REDIRECT_URL

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: plan-db
  namespace: plan
spec:
  instances: 1

  bootstrap:
    initdb:
      database: plan
      owner: admin

  storage:
    storageClass: cnpg
    size: 1Gi
    resizeInUseVolumes: true
  monitoring:
    enablePodMonitor: true

  managed:
    roles:
      - name: admin
        ensure: present
        login: true
        superuser: true
        passwordSecret:
          name: plan-db-admin
      - name: user
        ensure: present
        login: true
        passwordSecret:
          name: plan-db-user

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: NAMESPACE_PLACEHOLDER

resources:
  - ../../base
  - db

images:
  - name: plan-app
    newTag: IMAGE_TAG_PLACEHOLDER

patches:
  - path: deployment-patch.yaml

labels:
  - pairs:
      environment: ENV_NAME_PLACEHOLDER
      ephemeral: "true"

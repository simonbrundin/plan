apiVersion: apps/v1
kind: Deployment
metadata:
  name: plan-app
  labels:
    app: plan-app
spec:
  selector:
    matchLabels:
      app: plan-app
  template:
    metadata:
      labels:
        app: plan-app
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: plan-app
          image: ghcr.io/simonbrundin/plan:frontend-202606121357
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

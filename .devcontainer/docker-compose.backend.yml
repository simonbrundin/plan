services:
  postgres:
    image: postgres:16-alpine
    container_name: plan-dev-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: plan
      POSTGRES_PASSWORD: plan
      POSTGRES_DB: plan
    volumes:
      - ../environments/ephemeral/dev/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - plan-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plan -d plan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plan-postgres-data:

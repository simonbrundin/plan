services:
  postgres:
    image: postgres:16-alpine
    container_name: plan-dev-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: plan
      POSTGRES_PASSWORD: plan
      POSTGRES_DB: plan
    volumes:
      - ../environments/ephemeral/dev/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - plan-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plan -d plan"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: plan-dev-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NUXT_SESSION_PASSWORD=5c3ddb48cdb04a05aed90cdb9330cbc2
      - NUXT_SESSION_COOKIE_SECURE=false
      - NUXT_SESSION_COOKIE_SAMESITE=lax
      - DATABASE_URL=postgresql://plan:plan@postgres:5432/plan
      - NUXT_OAUTH_ZITADEL_CLIENT_ID=${NUXT_OAUTH_ZITADEL_CLIENT_ID}
      - NUXT_OAUTH_ZITADEL_DOMAIN=${NUXT_OAUTH_ZITADEL_DOMAIN}
      - NUXT_OAUTH_ZITADEL_REDIRECT_URL=${NUXT_OAUTH_ZITADEL_REDIRECT_URL}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-at-least-32-chars-long}
    volumes:
      - ../frontend/app:/app/app
      - ../frontend/server:/app/server
      - ../frontend/nuxt.config.ts:/app/nuxt.config.ts
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bun", "run", "dev", "--host", "0.0.0.0"]

volumes:
  plan-postgres-data:

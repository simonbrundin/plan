name: Commit Phase

on: [push, workflow_dispatch]

jobs:
  commit-phase:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Hämta app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Hämta Pipeline
        uses: actions/checkout@v4
        with:
          repository: simonbrundin/deployment-pipeline
          ref: refs/heads/main
          path: pipeline

      - name: Verifiera registry-åtkomst
        run: |
          TOKEN="${{ secrets.REGISTRY_PASSWORD }}"
          if [ -z "$TOKEN" ]; then
            echo "REGISTRY_PASSWORD is empty, using GITHUB_TOKEN"
            TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "$TOKEN" | docker login ghcr.io -u ${{ vars.REGISTRY_USERNAME }} --password-stdin

      - name: Kör Commit Phase
        uses: dagger/dagger-for-github@v8.3.0
        with:
          verb: call
          module: ./dagger-modules/pipeline
          workdir: ./pipeline
          call: commit-phase --source-dir ../app/frontend --registry-address ghcr.io/simonbrundin --image-name plan --username simonbrundin --multi-arch
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

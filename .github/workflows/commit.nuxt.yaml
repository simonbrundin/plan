name: CI för Nuxt applikation
on:
  push:
    paths:
      - src/nuxt/**
jobs:
  unit-tests:
    permissions:
      contents: read
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/run-tests-bun.yaml@main
    with:
      package-json-path: src/nuxt
  build-publish-image:
    needs: unit-tests
    permissions:
      contents: read
      packages: write
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/commit.build-publish-image.yaml@main
    secrets:
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
    with:
      dockerfile: src/nuxt/Dockerfile
      dockerfile-context: src/nuxt
      registry: ghcr.io/simonbrundin/plan
  store-image-tag:
    needs: build-publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Push image tag to CI branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin ci-latest:ci-latest 2>/dev/null || \
            git checkout --orphan ci-latest

          echo "${{ needs.build-publish-image.outputs.image }}" > .image-tag
          git add .image-tag
          git commit -m "chore: update image tag" || echo "No changes"
          git push -f origin ci-latest:ci-latest

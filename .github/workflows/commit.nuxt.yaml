name: CI för Nuxt applikation
on:
  push:
    paths:
      - frontend/**
permissions:
  contents: read
  packages: write
jobs:
  unit-tests:
    uses: simonbrundin/deployment-pipeline/.github/workflows/run-tests-bun.yaml@main
    with:
      package-json-path: frontend
  build-publish-image:
    needs: unit-tests
    uses: simonbrundin/deployment-pipeline/.github/workflows/commit.build-publish-image.yaml@main
    secrets:
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
    with:
      dockerfile: frontend/Dockerfile
      dockerfile-context: frontend
      registry: ghcr.io/simonbrundin/plan

  # acceptance:
  #   needs: build-publish-image
  #   uses: simonbrundin/deployment-pipeline/.github/workflows/acceptance.yaml@main
  #   with:
  #     image: ${{ needs.build-publish-image.outputs.image }}

  update-deployment:
    needs: build-publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image in deployment-patch.yaml
        run: |
          IMAGE="${{ needs.build-publish-image.outputs.image }}"
          echo "Updating image to: $IMAGE"
          sed -i "s|image: ghcr.io/simonbrundin/plan:.*|image: $IMAGE|" \
            environments/permanent/prod/deployment-patch.yaml
          cat environments/permanent/prod/deployment-patch.yaml

      - name: Create PR with image update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update plan-app image [skip ci]"
          branch: bot/update-plan-app-image
          delete-branch: true
          title: "chore: update plan-app image"
          body: |
            Automated image update from commit workflow
            - Image: `${{ needs.build-publish-image.outputs.image }}`
          labels: |
            ci
            skip-review
          add-paths: |
            environments/permanent/prod/deployment-patch.yaml

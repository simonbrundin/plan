name: CI för Nuxt applikation
on:
  push:
    paths:
      - src/nuxt/**
jobs:
  unit-tests:
    permissions:
      contents: read
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/run-tests-bun.yaml@main
    with:
      package-json-path: src/nuxt
  build-publish-image:
    needs: unit-tests
    permissions:
      contents: read
      packages: write
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/commit.build-publish-image.yaml@main
    secrets:
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
    with:
      dockerfile: src/nuxt/Dockerfile
      dockerfile-context: src/nuxt
      registry: ghcr.io/simonbrundin/plan
  store-image-tag:
    needs: build-publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Push image tag to CI branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build-publish-image.outputs.image }}
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Clone ci-latest branch or create empty one
          if git clone --depth 1 --branch ci-latest \
            "$REPO_URL" ci-branch 2>/dev/null; then
            echo "Cloned existing ci-latest branch"
          else
            echo "Creating new ci-latest branch"
            mkdir ci-branch
            cd ci-branch
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b ci-latest
            git commit --allow-empty -m "initial"
            git push -u "$REPO_URL" ci-latest
            cd ..
          fi

          # Update image tag
          cd ci-branch
          echo "$IMAGE_TAG" > .image-tag
          git add .image-tag
          git commit -m "chore: update image tag" || echo "No changes"
          git push -f "$REPO_URL" ci-latest:ci-latest

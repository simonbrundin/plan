name: CI för Nuxt applikation
on:
  push:
    paths:
      - src/nuxt/**
jobs:
  unit-tests:
    permissions:
      contents: read
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/run-tests-bun.yaml@main
    with:
      package-json-path: src/nuxt
  build-publish-image:
    needs: unit-tests
    permissions:
      contents: read
      packages: write
    uses: >-
      simonbrundin/deployment-pipeline/.github/workflows/commit.build-publish-image.yaml@main
    secrets:
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
    with:
      dockerfile: frontend/Dockerfile
      dockerfile-context: frontend
      registry: ghcr.io/simonbrundin/plan

  update-deployment:
    needs: build-publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Update image in deployment-patch.yaml
        env:
          IMAGE: ${{ needs.build-publish-image.outputs.image }}
        run: |
          echo "Updating image to: $IMAGE"
          sed -i "s|image: ghcr.io/simonbrundin/plan:.*|image: $IMAGE|" \
            environments/production/patches/deployment.yaml
          cat environments/production/patches/deployment.yaml

      - name: Create commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/production/patches/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "chore: update plan-app image [skip ci]"
          git push

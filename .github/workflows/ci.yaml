name: CI
on: [push]
jobs:
  commit:
    uses: simonbrundin/deployment-pipeline/.github/workflows/build.yaml@main
    with:
      source-dir: frontend
      registry-address: ghcr.io/simonbrundin
    secrets:
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

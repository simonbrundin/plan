name: CI
run-name: CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    services:
      dagger-engine:
        image: registry.dagger.io/engine:v0.18.17
        options: --privileged
        volumes:
          - /run/dagger:/run/dagger
          - /var/lib/dagger:/var/lib/dagger
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source-repo
          fetch-depth: 0

      - name: Checkout deployment pipeline
        uses: actions/checkout@v4
        with:
          repository: simonbrundin/deployment-pipeline
          token: ${{ secrets.GITHUB_TOKEN }}
          path: deployment-pipeline
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies for semantic-release
        run: npm install --ignore-scripts --legacy-peer-deps
        working-directory: source-repo/frontend

      - name: Run semantic-release
        id: semantic-release
        run: npx semantic-release
        working-directory: source-repo/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Get latest version tag
        id: get-version
        run: |
          cd source-repo
          VERSION=$(git describe --tags --match "frontend-*" --abbrev=0 | sed 's/frontend-//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $VERSION"

      - name: Download Dagger CLI
        run: |
          curl -L https://github.com/dagger/dagger/releases/download/v0.18.17/dagger_v0.18.17_linux_amd64.tar.gz | tar -xz -C /usr/local/bin
          chmod +x /usr/local/bin/dagger

      - name: Run Dagger CI
        run: |
          cd deployment-pipeline/dagger-modules/pipeline
          dagger call ci \
            --image-name ${{ github.event.repository.name }}-frontend \
            --registry-address ghcr.io/simonbrundin \
            --source-dir $GITHUB_WORKSPACE/source-repo/frontend\
            --tag frontend-${{ steps.get-version.outputs.version }} \
            --username simonbrundin \
            --secret ${{ secrets.REGISTRY_PASSWORD }} \
            --multiArch
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      dagger-engine:
        image: registry.dagger.io/engine:v0.18.17
        options: --privileged
        volumes:
          - /run/dagger:/run/dagger
          - /var/lib/dagger:/var/lib/dagger
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source-repo
          fetch-depth: 0

      - name: Checkout deployment pipeline
        uses: actions/checkout@v4
        with:
          repository: simonbrundin/deployment-pipeline
          token: ${{ secrets.GITHUB_TOKEN }}
          path: deployment-pipeline
          ref: main

      - name: Download Dagger CLI
        run: |
          curl -L https://github.com/dagger/dagger/releases/download/v0.18.17/dagger_v0.18.17_linux_amd64.tar.gz | tar -xz -C /usr/local/bin
          chmod +x /usr/local/bin/dagger

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies for semantic-release
        run: npm install --ignore-scripts --legacy-peer-deps
        working-directory: source-repo/frontend

      - name: Run semantic-release
        run: npx semantic-release
        working-directory: source-repo/frontend
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Run Dagger CI
        run: |
          cd deployment-pipeline/dagger-modules/pipeline
          dagger call ci \
            --image-name ${{ github.event.repository.name }}-backend \
            --registry-address ghcr.io/simonbrundin \
            --source-dir $GITHUB_WORKSPACE/source-repo/backend\
            --tag backend-${{ env.RELEASE_VERSION }} \
            --username simonbrundin \
            --secret ${{ secrets.REGISTRY_PASSWORD }} \
            --multiArch
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
